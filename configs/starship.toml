format = """
[](surface0)\
$os$username\
[](bg:peach fg:surface0)\
$directory\
[](fg:peach bg:green)\
$git_branch$git_status\
[](fg:green bg:teal)\
$nodejs$rust$golang$python\
[](fg:teal bg:purple)\
$time\
[ ](fg:purple)\
$line_break$character"""

palette = 'catppuccin_mocha'

[palettes.catppuccin_mocha]
rosewater="#f5e0dc"
flamingo="#f2cdcd"
pink="#f5c2e7"
mauve="#cba6f7"
red="#f38ba8"
maroon="#eba0ac"
peach="#fab387"
yellow="#f9e2af"
green="#a6e3a1"
teal="#94e2d5"
sky="#89dceb"
sapphire="#74c7ec"
blue="#89b4fa"
lavender="#b4befe"
text="#cdd6f4"
subtext1="#bac2de"
subtext0="#a6adc8"
overlay2="#9399b2"
overlay1="#7f849c"
overlay0="#6c7086"
surface2="#585b70"
surface1="#45475a"
surface0="#313244"
base="#1e1e2e"
mantle="#181825"
crust="#11111b"
purple="#cba6f7"

[os]
disabled = false
style = "bg:surface0 fg:text"

[os.symbols]
Macos = ""

[username]
show_always = true
style_user  = "bg:surface0 fg:text"
style_root  = "bg:surface0 fg:red"
format      = '[ $user ]($style)'

[directory]
style             = "fg:mantle bg:peach"
format            = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "…/"

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Developer" = "󰲋 "

[git_branch]
symbol = ""
style  = "bg:green"
format = '[[ $symbol $branch ](fg:mantle bg:green)]($style)'

[git_status]
style  = "bg:green"
format = '[[($all_status$ahead_behind )](fg:mantle bg:green)]($style)'

[nodejs]
symbol = ""
style  = "bg:teal"
format = '[[ $symbol( $version) ](fg:mantle bg:teal)]($style)'

[python]
symbol = ""
style  = "bg:teal"
format = '[[ $symbol( $version) ](fg:mantle bg:teal)]($style)'

[golang]
symbol = ""
style  = "bg:teal"
format = '[[ $symbol( $version) ](fg:mantle bg:teal)]($style)'

[rust]
symbol = ""
style  = "bg:teal"
format = '[[ $symbol( $version) ](fg:mantle bg:teal)]($style)'

[time]
disabled    = false
time_format = "%R"
style       = "bg:purple"
format      = '[[  $time ](fg:mantle bg:purple)]($style)'

[line_break]
disabled = false

[character]
success_symbol = '[❯](bold fg:green)'
error_symbol   = '[❯](bold fg:red)'
vimcmd_symbol  = '[❮](bold fg:green)'
